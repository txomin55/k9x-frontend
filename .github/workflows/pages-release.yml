name: Pages and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  pages_release:
    name: Build, Deploy Pages and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: write
    env:
      CI_BUILD_ENV: staging
      CI_JOB_ID: ${{ github.run_id }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: bash ./ci-scripts/generic-before.sh

      - name: Build pages
        run: bash ./ci-scripts/pages.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          name: pages

      - name: Set release date tag
        id: release_vars
        run: echo "release_tag=pages-$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Create release archive
        run: zip -r public.zip public

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_vars.outputs.release_tag }}
          name: Release ${{ steps.release_vars.outputs.release_tag }}
          files: public.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old pages artifacts (keep last 2)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const perPage = 100;
            const targetName = "pages";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: perPage }
            );

            const pagesArtifacts = artifacts
              .filter((artifact) => artifact.name === targetName)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = pagesArtifacts.slice(2);

            for (const artifact of toDelete) {
              core.info(`Deleting artifact ${artifact.name} (#${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
