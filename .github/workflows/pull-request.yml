name: CI

on:
  #pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            .pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: bash ./ci-scripts/generic-before.sh

      - name: Run unit tests
        run: bash ./ci-scripts/unit-tests.sh

      - name: Upload unit reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit
          path: .reports/*
          include-hidden-files: true

  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ui/app/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Resolve Playwright cache metadata
        id: playwright_meta
        run: |
          PLAYWRIGHT_VERSION="$(node -e "const fs=require('fs'); const lines=fs.readFileSync('pnpm-lock.yaml','utf8').split(/\\r?\\n/); let inApp=false; let inDev=false; let found=false; let version=''; for (const line of lines) { if (!inApp && /^  ui\\/app:$/.test(line)) { inApp=true; continue; } if (inApp && /^    devDependencies:$/.test(line)) { inDev=true; continue; } if (inApp && inDev && /^      '@playwright\\/test':$/.test(line)) { found=true; continue; } if (found) { const match=line.match(/^        version: ([^\\s]+)/); if (match) { version=match[1].split('(')[0]; break; } } if (inApp && /^  [^ ]/.test(line)) { break; } } if (!version) { process.exit(1); } process.stdout.write(version);")"
          echo "version=$PLAYWRIGHT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ui/app/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright_meta.outputs.version }}

      - name: Install deps
        run: bash ./ci-scripts/generic-before.sh

      - name: Run E2E tests
        run: bash ./ci-scripts/e2e-tests.sh

      - name: Upload e2e reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports-e2e
          path: .reports
          include-hidden-files: true

  test_summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ unit_tests, e2e_tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: bash ./ci-scripts/generic-before.sh

      - name: Download unit reports
        uses: actions/download-artifact@v4
        with:
          name: reports-unit
          path: artifacts/unit

      - name: Download e2e reports
        uses: actions/download-artifact@v4
        with:
          name: reports-e2e
          path: artifacts/e2e

      - name: Merge reports
        run: |
          mkdir -p .reports
          cp -R artifacts/unit/. .reports/
          cp -R artifacts/e2e/. .reports/

      - name: Build summary coverage
        run: bash ./ci-scripts/test-summary.sh

      - name: Produce the coverage report
        uses: insightsengineering/coverage-action@v3
        with:
          path: .reports/test/total/coverage/cobertura-coverage.xml
          threshold: 45
          fail: true
          publish: true
          diff: true
          diff-branch: main
          diff-storage: _xml_coverage_reports
          coverage-summary-title: "Code Coverage Summary"
          uncovered-statements-increase-failure: false
          new-uncovered-statements-failure: false
          coverage-rate-reduction-failure: true

      - name: Upload summary reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports-summary
          path: .reports
          include-hidden-files: true

  sonar_check:
    name: Sonar Check
    runs-on: ubuntu-latest
    needs: [ unit_tests, e2e_tests, test_summary ]
    env:
      SONAR_USER_HOME: .sonar
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download summary reports
        uses: actions/download-artifact@v4
        with:
          name: reports-summary
          path: artifacts/summary

      - name: Download unit reports
        uses: actions/download-artifact@v4
        with:
          name: reports-unit
          path: artifacts/unit

      - name: Download e2e reports
        uses: actions/download-artifact@v4
        with:
          name: reports-e2e
          path: artifacts/e2e

      - name: Merge reports
        run: |
          mkdir -p .reports
          cp -R artifacts/unit/. .reports/
          cp -R artifacts/e2e/. .reports/
          cp -R artifacts/summary/. .reports/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
