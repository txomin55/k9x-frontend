      <path d="M 18,52 L 50,140 L 30,120 L 14,140 L -2,52 Z" class="color1" transform="rotate(28)"/>
      <path d="M -13,54 L -26,146 L -3,126 L 19,146 L 13,54 Z" class="color3"/>
    </g>

    <!-- Borde exterior festoneado (bultos redondeados) -->
    <g class="color1">
      <circle cx="0" cy="0" r="54"/>
      <circle cx="0" cy="-62" r="15"/>
      <circle cx="0" cy="-62" r="15" transform="rotate(20)"/>
      <circle cx="0" cy="-62" r="15" transform="rotate(40)"/>
